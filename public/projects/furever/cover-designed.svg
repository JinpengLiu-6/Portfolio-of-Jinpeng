<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="FurEver project cover">
  <defs>
    <radialGradient id="glow" cx="72%" cy="30%" r="62%">
      <stop offset="0" stop-color="#76f2b8" stop-opacity=".28"/>
      <stop offset=".42" stop-color="#3ecf8e" stop-opacity=".12"/>
      <stop offset="1" stop-color="#08090f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14151f"/>
      <stop offset=".54" stop-color="#0b1012"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0v54" fill="none" stroke="rgba(255,255,255,.055)" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity=".46"/>
    </filter>
    <style>
      .bg{fill:url(#wash)}
      .grid{fill:url(#grid);opacity:.72}
      .panel,.card{fill:rgba(255,255,255,.052);stroke:rgba(255,255,255,.14);stroke-width:2;filter:url(#softShadow)}
      .thin{fill:none;stroke:rgba(255,255,255,.18);stroke-width:2}
      .line{fill:none;stroke:#3ecf8e;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;opacity:.82}
      .beam{fill:none;stroke:#76f2b8;stroke-width:7;stroke-linecap:round;opacity:.88}
      .arc{fill:none;stroke:#3ecf8e;stroke-width:24;stroke-linecap:round;opacity:.72}
      .route{fill:none;stroke:#76f2b8;stroke-width:9;stroke-linecap:round;stroke-linejoin:round;opacity:.88}
      .node{fill:rgba(255,255,255,.06);stroke:#76f2b8;stroke-width:3}
      .coin{fill:#3ecf8e;opacity:.9;filter:url(#softShadow)}
      .coinText{font:800 54px "Space Grotesk","Hanken Grotesk",Arial,sans-serif;fill:#fff}
      .mid{transform:translateY(-18px)}
      .eyebrow{font:700 26px "JetBrains Mono","SFMono-Regular",monospace;letter-spacing:7px;fill:#76f2b8}
      .title{font:800 94px "Space Grotesk","Hanken Grotesk",Arial,sans-serif;letter-spacing:-2px;fill:#f7f8ff}
      .subtitle{font:650 38px "Hanken Grotesk","Inter",Arial,sans-serif;fill:rgba(247,248,255,.78)}
      .note{font:500 24px "JetBrains Mono","SFMono-Regular",monospace;fill:rgba(247,248,255,.54)}
      .chipText{font:700 20px "JetBrains Mono","SFMono-Regular",monospace;letter-spacing:3px;fill:#06110d}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <rect class="grid" width="1600" height="900"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <circle cx="1325" cy="150" r="315" fill="#3ecf8e" opacity=".12"/>
  <circle cx="1280" cy="690" r="220" fill="#76f2b8" opacity=".08"/>
  <g transform="translate(96 90)">
    <rect x="0" y="0" width="1408" height="720" rx="44" fill="rgba(255,255,255,.035)" stroke="rgba(255,255,255,.11)" stroke-width="2"/>
    <g transform="translate(52 48)">
      <circle cx="0" cy="0" r="12" fill="#ff5f57"/>
      <circle cx="34" cy="0" r="12" fill="#febc2e"/>
      <circle cx="68" cy="0" r="12" fill="#28c840"/>
    </g>
    <g transform="translate(70 190)">
      <text class="eyebrow">MOBILE PRODUCT / 2025</text>
      <text class="title" y="126">FurEver</text>
      <text class="subtitle" y="194">Pet Care Companion</text>
      <text class="note" y="282">Tracking, safety zones, documents, reminders, and community</text>
      <g transform="translate(0 360)">
        <rect width="208" height="54" rx="27" fill="#76f2b8"/>
        <text class="chipText" x="104" y="35" text-anchor="middle">CASE STUDY</text>
      </g>
    </g>
    
      <g transform="translate(1010 220)">
        <circle cx="198" cy="220" r="76" fill="#3ecf8e" opacity=".22"/>
        <circle cx="132" cy="146" r="34" fill="#76f2b8" opacity=".86"/>
        <circle cx="200" cy="115" r="38" fill="#76f2b8" opacity=".74"/>
        <circle cx="268" cy="146" r="34" fill="#76f2b8" opacity=".86"/>
        <circle cx="106" cy="218" r="32" fill="#3ecf8e" opacity=".76"/>
        <circle cx="294" cy="218" r="32" fill="#3ecf8e" opacity=".76"/>
        <path d="M142 246c28-55 88-55 116 0 22 42-7 83-58 83s-80-41-58-83Z" fill="#76f2b8" opacity=".92"/>
      </g>
  </g>
</svg>
